  <body translate-cloak ng-cloak>
    <onboarding-popover ng-if="onboardingEnabled" enabled="onboardingEnabled" steps="onboardingSteps"></onboarding-popover>

    <!-- ========== 顶部导航栏 ========== -->
    <nav class="top-bar" role="navigation" ng-controller="Navigation">
      <div ng-controller="Footer" style="display:flex;align-items:center;justify-content:space-between;width:100%">
      <div class="top-bar-left">
        <button type="button" class="sidebar-toggle" ng-click="sidebarCollapsed = !sidebarCollapsed"
                ng-init="sidebarCollapsed = false">
          <span class="fas fa-bars"></span>
        </button>
        <a class="top-bar-brand" href="#">
          <img src="img/school-logo.png" class="top-bar-logo" alt="校标" />
          <span>机关单位电子文档管理系统</span>
        </a>
      </div>

      <div class="top-bar-right" ng-show="!userInfo.anonymous">
        <!-- 语言切换 -->
        <div class="top-bar-item" uib-dropdown>
          <a href uib-dropdown-toggle class="top-bar-link">
            <span class="fas fa-globe"></span>
            <span class="hidden-xs">{{ currentLangLabel || '简体中文' }}</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-right">
            <li><a href ng-click="changeLanguage('zh_CN')">简体中文</a></li>
            <li><a href ng-click="changeLanguage('en')">English</a></li>
          </ul>
        </div>

        <!-- 用户菜单 -->
        <div class="top-bar-item" uib-dropdown>
          <a href uib-dropdown-toggle class="top-bar-link">
            <span class="fas fa-user-circle"></span>
            <span class="hidden-xs">{{ userInfo.username }}</span>
          </a>
          <ul class="dropdown-menu dropdown-menu-right">
            <li><a href="#/settings/account"><span class="fas fa-id-card"></span> 个人信息</a></li>
            <li><a href="#/settings/security"><span class="fas fa-shield-alt"></span> 安全设置</a></li>
            <li class="divider"></li>
            <li><a href="#" ng-click="logout($event)"><span class="fas fa-sign-out-alt"></span> 退出登录</a></li>
          </ul>
        </div>
      </div>
      </div>
    </nav>

    <!-- ========== 侧边栏 ========== -->
    <aside class="layout-sidebar" ng-class="{ collapsed: sidebarCollapsed }" ng-show="!userInfo.anonymous">
      <div ng-include="'partial/docs/sidebar.html'"></div>
    </aside>

    <!-- ========== 主内容区 ========== -->
    <main class="layout-content" ng-class="{ expanded: sidebarCollapsed, full: userInfo.anonymous }">
      <div ui-view="page"></div>
    </main>
