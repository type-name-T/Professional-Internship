<!-- 发文拟稿表单 -->
<div class="doc-form">
  <div class="page-header">
    <h3 class="page-title"><span class="fas fa-paper-plane"></span> 发文拟稿</h3>
    <div class="page-actions">
      <a href="#/document/list?type=SEND" class="btn btn-sm btn-default">
        <span class="fas fa-arrow-left"></span> 返回列表
      </a>
    </div>
  </div>

  <div class="panel panel-default">
    <div class="panel-heading">
      <span class="fas fa-edit"></span> 发文基本信息
    </div>
    <div class="panel-body">
      <form class="form-horizontal">
        <!-- 发文类型 -->
        <div class="form-group">
          <label class="col-sm-2 control-label">发文类型 <span class="text-red">*</span></label>
          <div class="col-sm-4">
            <select class="form-control" ng-model="doc.outgoingType">
              <option value="SEND">普通发文</option>
              <option value="NOTICE">通知</option>
              <option value="REPORT">报告</option>
              <option value="REQUEST">请示</option>
              <option value="REPLY">批复</option>
              <option value="OPINION">意见</option>
            </select>
          </div>
          <label class="col-sm-2 control-label">拟稿日期 <span class="text-red">*</span></label>
          <div class="col-sm-4">
            <input type="date" class="form-control" ng-model="doc.createDate"
                   ng-value="today" />
          </div>
        </div>

        <!-- 文件标题 -->
        <div class="form-group">
          <label class="col-sm-2 control-label">文件标题 <span class="text-red">*</span></label>
          <div class="col-sm-10">
            <input type="text" class="form-control" ng-model="doc.title"
                   placeholder="请输入文件标题" />
          </div>
        </div>

        <!-- 主送 + 抄送 -->
        <div class="form-group">
          <label class="col-sm-2 control-label">主送单位 <span class="text-red">*</span></label>
          <div class="col-sm-4">
            <input type="text" class="form-control" ng-model="doc.mainRecipient"
                   placeholder="主送单位全称" />
          </div>
          <label class="col-sm-2 control-label">抄送单位</label>
          <div class="col-sm-4">
            <input type="text" class="form-control" ng-model="doc.ccRecipient"
                   placeholder="多个抄送单位用逗号分隔" />
          </div>
        </div>

        <!-- 密级 + 紧急程度 -->
        <div class="form-group">
          <label class="col-sm-2 control-label">密级 <span class="text-red">*</span></label>
          <div class="col-sm-4">
            <select class="form-control" ng-model="doc.secrecyLevel">
              <option value="PUBLIC">公开</option>
              <option value="INTERNAL" selected>内部</option>
              <option value="SECRET">秘密</option>
              <option value="CONFIDENTIAL">机密</option>
              <option value="TOP_SECRET">绝密</option>
            </select>
          </div>
          <label class="col-sm-2 control-label">紧急程度</label>
          <div class="col-sm-4">
            <select class="form-control" ng-model="doc.urgency">
              <option value="NORMAL" selected>一般</option>
              <option value="URGENT">紧急</option>
              <option value="EMERGENCY">特急</option>
            </select>
          </div>
        </div>

        <!-- 拟稿部门 + 拟稿人 -->
        <div class="form-group">
          <label class="col-sm-2 control-label">拟稿部门 <span class="text-red">*</span></label>
          <div class="col-sm-4">
            <select class="form-control" ng-model="doc.departmentId">
              <option value="">请选择部门</option>
              <option value="dept-001">办公室</option>
              <option value="dept-002">综合科</option>
              <option value="dept-003">文秘科</option>
              <option value="dept-004">财务处</option>
              <option value="dept-005">人事处</option>
            </select>
          </div>
          <label class="col-sm-2 control-label">拟稿人</label>
          <div class="col-sm-4">
            <input type="text" class="form-control" ng-model="doc.author" readonly
                   ng-value="userInfo.username" />
          </div>
        </div>

        <!-- 正文内容 -->
        <div class="form-group">
          <label class="col-sm-2 control-label">正文内容</label>
          <div class="col-sm-10">
            <div class="editor-toolbar">
              <button type="button" class="btn btn-xs btn-default" ng-click="execCmd('bold')" title="加粗"><b>B</b></button>
              <button type="button" class="btn btn-xs btn-default" ng-click="execCmd('italic')" title="斜体"><i>I</i></button>
              <button type="button" class="btn btn-xs btn-default" ng-click="execCmd('underline')" title="下划线"><u>U</u></button>
              <span class="toolbar-sep"></span>
              <button type="button" class="btn btn-xs btn-default" ng-click="execCmd('insertUnorderedList')" title="列表">
                <span class="fas fa-list-ul"></span></button>
              <button type="button" class="btn btn-xs btn-default" ng-click="execCmd('insertOrderedList')" title="编号">
                <span class="fas fa-list-ol"></span></button>
            </div>
            <div class="editor-area" contenteditable="true" id="docContentEditor"
                 ng-model="doc.content" placeholder="请输入正文内容..."></div>
          </div>
        </div>

        <!-- 附件上传 -->
        <div class="form-group">
          <label class="col-sm-2 control-label">附件</label>
          <div class="col-sm-10">
            <div class="upload-area" ng-file-drop ng-model="files">
              <span class="fas fa-cloud-upload-alt"></span>
              <span>点击或拖拽文件到此处上传附件</span>
              <input type="file" ng-file-select ng-model="files" multiple />
            </div>
            <div class="file-list" ng-if="files.length > 0">
              <div class="file-item" ng-repeat="file in files">
                <span class="fas fa-paperclip"></span> {{ file.name }}
              </div>
            </div>
          </div>
        </div>

        <!-- 主题词 -->
        <div class="form-group">
          <label class="col-sm-2 control-label">主题词</label>
          <div class="col-sm-10">
            <input type="text" class="form-control" ng-model="doc.keywords"
                   placeholder="多个主题词用逗号分隔" />
          </div>
        </div>

        <!-- 备注 -->
        <div class="form-group">
          <label class="col-sm-2 control-label">备注</label>
          <div class="col-sm-10">
            <textarea class="form-control" rows="2" ng-model="doc.notes"
                      placeholder="其他需要说明的信息"></textarea>
          </div>
        </div>

        <!-- 审批流程预览 -->
        <div class="form-group">
          <label class="col-sm-2 control-label">审批流程</label>
          <div class="col-sm-10">
            <div class="workflow-preview">
              <span class="wf-step"><span class="fas fa-pencil-alt"></span> 拟稿</span>
              <span class="wf-arrow">→</span>
              <span class="wf-step"><span class="fas fa-user-check"></span> 科室审核</span>
              <span class="wf-arrow">→</span>
              <span class="wf-step"><span class="fas fa-user-tie"></span> 部门审核</span>
              <span class="wf-arrow">→</span>
              <span class="wf-step"><span class="fas fa-stamp"></span> 领导签发</span>
              <span class="wf-arrow">→</span>
              <span class="wf-step"><span class="fas fa-check-circle"></span> 编号分发</span>
            </div>
          </div>
        </div>

        <!-- 操作按钮 -->
        <div class="form-group">
          <div class="col-sm-offset-2 col-sm-10">
            <button type="submit" class="btn btn-primary" ng-click="saveDraft()">
              <span class="fas fa-save"></span> 保存草稿
            </button>
            <button type="submit" class="btn btn-warning" ng-click="submitForReview()">
              <span class="fas fa-paper-plane"></span> 提交审核
            </button>
            <a href="#/document/list?type=SEND" class="btn btn-link">取消</a>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
